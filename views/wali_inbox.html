<!DOCTYPE html>
<html lang="id">
<head>
    <title>Inbox - SIM-P</title>
    {{ template "meta_head" }}
</head>
<body class="bg-slate-900 min-h-screen pb-28 text-slate-200 relative overflow-x-hidden">
    {{ template "bg_watermark" }}
    {{ template "header_wali" }}

    <main class="px-5 space-y-4 relative z-10 mt-2">
        
        <div class="border-l-4 border-indigo-400 pl-3 mb-4">
            <h2 class="text-xl font-black text-white">Kotak Masuk</h2>
            <p class="text-[10px] text-indigo-400 font-bold uppercase tracking-widest">Pesan & Info Sistem</p>
        </div>

        {{ range .Notifikasi }}
        <div class="glass-card rounded-[24px] p-5 shadow-lg relative overflow-hidden">
            <div class="flex justify-between items-start mb-2">
                <span class="text-[9px] font-black uppercase tracking-widest px-2 py-1 rounded-md bg-slate-700 text-white">{{ .Kategori }}</span>
                <span class="text-[9px] text-slate-500 font-bold">{{ .Tanggal.Format "02 Jan 15:04" }}</span>
            </div>
            <h3 class="font-black text-white text-base leading-tight mb-2">{{ .Judul }}</h3>
            <p class="text-xs text-slate-300 leading-relaxed">{{ .Pesan }}</p>
        </div>
        {{ else }}
        <div class="text-center p-8 glass-card rounded-2xl text-slate-500 text-xs font-bold mt-10">Belum ada pesan.</div>
        {{ end }}
    </main>

    {{ template "nav_wali" . }}
</body>
</html>
